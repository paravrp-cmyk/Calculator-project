<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">Claculator</div>
    <div class="functional">
        <div class="displayHistory"></div>
        <div class="displayCurrent">0</div>
        <div class="buttons">
            <button class="btn-gray delete">⌫</button>
            <button class="btn-gray clear">AC</button>
            <button class="btn-gray percent">%</button>
            <button class="btn-orange operator" data-action="divide">÷</button>

            <button class="btn-dark-gray number">7</button>
            <button class="btn-dark-gray number">8</button>
            <button class="btn-dark-gray number">9</button>
            <button class="btn-orange operator" data-action="multiply">×</button>

            <button class="btn-dark-gray number">4</button>
            <button class="btn-dark-gray number">5</button>
            <button class="btn-dark-gray number">6</button>
            <button class="btn-orange operator" data-action="subtract">-</button>

            <button class="btn-dark-gray number">1</button>
            <button class="btn-dark-gray number">2</button>
            <button class="btn-dark-gray number">3</button>
            <button class="btn-orange operator" data-action="add">+</button>
            
            <button class="btn-gray toggle-sign">+/-</button>
            <button class="btn-dark-gray number zero">0</button>
            <button class="btn-dark-gray decimal">,</button>
            <button class="btn-orange equal">=</button>
</div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
